<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0F1628">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="하우재부동산">
  <meta name="mobile-web-app-capable" content="yes">
  <title>하우재 공인중개사사무소 — 언제나 당신 편, 홍대·마포 전문</title>
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <!-- iOS 아이콘 -->
  <link rel="apple-touch-icon" href="assets/logo.png">
  <link rel="apple-touch-icon" sizes="152x152" href="assets/logo.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/logo.png">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <!-- Leaflet (지도) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/style.css">
  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    .logo-img { width:40px; height:40px; object-fit:contain; }
    .logo-img-sm { width:28px; height:28px; object-fit:contain; }
    .logo-img-lg { width:72px; height:72px; object-fit:contain; }
  </style>
</head>
<body>
  <div id="app"></div>

  <!-- Firebase 설정 & DB -->
  <script src="js/firebase-config.js"></script>
  <script src="js/db.js"></script>
  <!-- 매물 데이터 (기본값 / 폴백) -->
  <script src="js/data.js"></script>
  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- 뷰 모듈 -->
  <script src="js/lunar.js"></script>
  <script src="js/map.js"></script>
  <script src="js/listings.js"></script>
  <script src="js/calculator.js"></script>
  <script src="js/moving.js"></script>
  <script src="js/market.js"></script>
  <script src="js/partner.js"></script>
  <script src="js/checklist.js"></script>
  <script src="js/register.js"></script>
  <!-- 앱 메인 -->
  <script src="js/app.js"></script>

  <!-- PWA Service Worker 등록 + 자동 업데이트 토스트 -->
  <script>
    if ('serviceWorker' in navigator) {
      // 기존 컨트롤러 있을 때만 토스트 표시 (첫 설치 제외)
      const hadController = !!navigator.serviceWorker.controller;

      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (hadController) _showUpdateToast();
      });

      // SW 업데이트 메시지 수신 → 자동 새로고침
      navigator.serviceWorker.addEventListener('message', (e) => {
        if (e.data?.type === 'SW_UPDATED') window.location.reload();
      });

      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('[PWA] Service Worker 등록 완료:', reg.scope))
          .catch(err => console.warn('[PWA] Service Worker 등록 실패:', err));
      });
    }

    function _showUpdateToast() {
      if (document.getElementById('sw-toast')) return;
      const el = document.createElement('div');
      el.id = 'sw-toast';
      el.innerHTML = `
        <div style="position:fixed;bottom:76px;left:50%;transform:translateX(-50%);
          background:#1A2340;border:1px solid rgba(196,164,90,.5);border-radius:6px;
          padding:11px 14px;display:flex;align-items:center;gap:10px;z-index:9999;
          box-shadow:0 4px 24px rgba(0,0,0,.5);white-space:nowrap;
          animation:fadeInUp .3s ease">
          <span style="font-size:12px;color:rgba(255,255,255,.85)">✨ 새 버전이 있어요</span>
          <button onclick="location.reload()"
            style="background:#C4A45A;color:#1A2340;border:none;border-radius:3px;
            padding:5px 12px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit">
            새로고침
          </button>
          <button onclick="this.closest('#sw-toast').remove()"
            style="background:none;border:none;color:rgba(255,255,255,.4);font-size:16px;
            cursor:pointer;padding:0 2px;line-height:1">✕</button>
        </div>
        <style>
          @keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}
          to{opacity:1;transform:translateX(-50%) translateY(0)}}
        </style>`;
      document.body.appendChild(el);
    }
  </script>

  <!--
  ══ 네이버 지도 연동 방법 ══
  1. https://www.ncloud.com/ → AI·NAVER API → Maps 서비스 신청
  2. Client ID 발급 후 아래 주석 해제:
  <script src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=YOUR_CLIENT_ID"></script>
  3. js/map.js 하단 주석 참고하여 init() 함수를 네이버 방식으로 교체
  ══════════════════════════
  -->
</body>
</html>
