<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>하우재 사람 풀 관리 | Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/db.js"></script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --navy:#0F1628; --navy2:#1A2340; --gold:#C4A45A;
      --bg:#F7F4EF; --surface:#FFFFFF; --surface2:#F0ECE5;
      --text:#1A1A18; --muted:#6B6460;
      --border:#DDD8CF; --error:#C62828; --success:#2E7D32;
      --radius:3px;
    }
    body { font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); }

    #login-screen {
      position:fixed; inset:0; background:var(--navy);
      display:flex; align-items:center; justify-content:center; z-index:999;
    }
    .login-box {
      background:var(--navy2); border:1px solid rgba(196,164,90,.2);
      border-radius:4px; padding:40px; width:360px; max-width:90vw; text-align:center;
    }
    .login-logo { width:64px; height:64px; object-fit:contain; margin-bottom:16px; }
    .login-title { color:white; font-size:18px; font-weight:700; margin-bottom:4px; }
    .login-sub { color:var(--gold); font-size:11px; letter-spacing:2px; text-transform:uppercase; margin-bottom:28px; }
    .login-input {
      width:100%; padding:12px 14px; background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.12); border-radius:var(--radius);
      color:white; font-size:15px; font-family:inherit; margin-bottom:12px; outline:none;
    }
    .login-input:focus { border-color:var(--gold); }
    .login-btn {
      width:100%; padding:13px; background:var(--gold); color:var(--navy);
      border:none; border-radius:var(--radius); font-size:14px; font-weight:800;
      font-family:inherit; cursor:pointer;
    }
    .login-err { color:#EF5350; font-size:12px; margin-top:8px; min-height:18px; }

    .admin-header {
      background:var(--navy); border-bottom:1px solid rgba(196,164,90,.15);
      padding:0 24px; height:56px; display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:100;
    }
    .admin-header-left { display:flex; align-items:center; gap:12px; }
    .header-title { color:white; font-size:14px; font-weight:700; }
    .header-sub { color:var(--gold); font-size:10px; letter-spacing:1.5px; text-transform:uppercase; }
    .btn-outline {
      padding:6px 14px; border:1px solid rgba(255,255,255,.2);
      background:transparent; color:rgba(255,255,255,.6); border-radius:var(--radius);
      font-size:11px; cursor:pointer; font-family:inherit; text-decoration:none;
      display:inline-flex; align-items:center;
    }
    .btn-gold {
      padding:6px 14px; border:1px solid rgba(196,164,90,.5);
      background:transparent; color:var(--gold); border-radius:var(--radius);
      font-size:11px; cursor:pointer; font-family:inherit; text-decoration:none;
      display:inline-flex; align-items:center;
    }

    .main { max-width:960px; margin:0 auto; padding:24px; }

    /* 필터 바 */
    .filter-bar { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px; align-items:center; }
    .filter-label { font-size:12px; color:var(--muted); font-weight:600; }
    .filter-btn {
      padding:5px 12px; background:var(--surface2); border:1px solid var(--border);
      border-radius:2px; font-size:12px; cursor:pointer; font-family:inherit; color:var(--text);
    }
    .filter-btn.active { background:var(--navy); color:var(--gold); border-color:rgba(196,164,90,.4); }

    /* 통계 */
    .stats { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
    .stat-card {
      background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
      padding:12px 18px; flex:1; min-width:80px;
    }
    .stat-num { font-size:24px; font-weight:800; color:var(--navy); }
    .stat-label { font-size:11px; color:var(--muted); margin-top:2px; }

    /* 카드 목록 */
    .pool-card {
      background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
      padding:16px 20px; margin-bottom:10px;
    }
    .pool-card-header { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:10px; }
    .pool-name { font-size:15px; font-weight:700; }
    .pool-phone { font-size:12px; color:var(--muted); margin-top:3px; }
    .pool-badges { display:flex; gap:6px; flex-wrap:wrap; }
    .badge {
      display:inline-block; padding:3px 8px; border-radius:2px;
      font-size:11px; font-weight:700; letter-spacing:.3px;
    }
    .badge-pending  { background:rgba(191,96,0,.1);  color:#BF6000; border:1px solid rgba(191,96,0,.2); }
    .badge-approved { background:rgba(46,125,50,.1);  color:#2E7D32; border:1px solid rgba(46,125,50,.2); }
    .badge-rejected { background:rgba(198,40,40,.08); color:var(--error); border:1px solid rgba(198,40,40,.2); }
    .badge-role     { background:rgba(15,22,40,.08);  color:var(--navy); border:1px solid rgba(15,22,40,.15); }
    .pool-desc { font-size:13px; color:var(--muted); line-height:1.8; margin-bottom:10px; }
    .pool-spec { font-size:12px; color:var(--muted); margin-bottom:10px; }
    .pool-footer { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .pool-date { font-size:11px; color:var(--muted); }
    .action-btns { display:flex; gap:6px; }
    .btn-approve {
      padding:6px 14px; background:rgba(46,125,50,.1); border:1px solid rgba(46,125,50,.3);
      color:var(--success); border-radius:2px; font-size:12px; cursor:pointer; font-family:inherit; font-weight:600;
    }
    .btn-reject {
      padding:6px 14px; background:rgba(198,40,40,.07); border:1px solid rgba(198,40,40,.2);
      color:var(--error); border-radius:2px; font-size:12px; cursor:pointer; font-family:inherit;
    }
    .btn-approve:disabled, .btn-reject:disabled { opacity:.4; cursor:default; }

    .empty { text-align:center; padding:48px; color:var(--muted); background:var(--surface); border-radius:var(--radius); }
    #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--navy); color:white; padding:10px 20px; border-radius:var(--radius); font-size:13px; border:1px solid rgba(196,164,90,.3); z-index:9999; opacity:0; transition:opacity .3s; pointer-events:none; }
    #toast.show { opacity:1; }
    .hidden { display:none !important; }
    .db-status { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:2px; font-size:11px; font-weight:700; }
    .db-status.firestore { background:rgba(46,125,50,.12); color:#2E7D32; border:1px solid rgba(46,125,50,.25); }
    .db-status.local     { background:rgba(191,96,0,.12); color:#BF6000; border:1px solid rgba(191,96,0,.25); }
    .db-status.loading   { background:rgba(196,164,90,.1); color:#8B6E2A; border:1px solid rgba(196,164,90,.2); }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <img src="assets/logo.png" class="login-logo" alt="하우재">
    <div class="login-title">하우재 관리자</div>
    <div class="login-sub">People Pool</div>
    <input type="password" class="login-input" id="pw-input" placeholder="비밀번호 입력"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<div id="admin-screen" class="hidden">
  <header class="admin-header">
    <div class="admin-header-left">
      <img src="assets/logo.png" style="width:28px;height:28px;object-fit:contain" alt="하우재">
      <div>
        <div class="header-title">사람 풀 관리</div>
        <div class="header-sub">People Pool Admin</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="db-status loading" id="db-status">⏳ 연결 중...</span>
      <a href="admin.html" class="btn-gold">← 매물 관리</a>
      <button class="btn-outline" onclick="doLogout()">로그아웃</button>
    </div>
  </header>

  <div class="main">
    <!-- 통계 -->
    <div class="stats" id="stats-area"></div>

    <!-- 필터 -->
    <div class="filter-bar">
      <span class="filter-label">역할:</span>
      <button class="filter-btn active" onclick="setRoleFilter(null, this)">전체</button>
      <button class="filter-btn" onclick="setRoleFilter('seller', this)">🏠 매도자</button>
      <button class="filter-btn" onclick="setRoleFilter('buyer', this)">🔍 매수자</button>
      <button class="filter-btn" onclick="setRoleFilter('landlord', this)">🔑 임대인</button>
      <button class="filter-btn" onclick="setRoleFilter('tenant', this)">📋 신규임차인</button>
      <button class="filter-btn" onclick="setRoleFilter('outgoing', this)">🤝 기존임차인</button>
      <button class="filter-btn" onclick="setRoleFilter('interior', this)">🎨 인테리어</button>
      <button class="filter-btn" onclick="setRoleFilter('reno', this)">🔨 리모델링</button>
    </div>
    <div class="filter-bar">
      <span class="filter-label">상태:</span>
      <button class="filter-btn active" onclick="setStatusFilter(null, this)">전체</button>
      <button class="filter-btn" onclick="setStatusFilter('pending', this)">⏳ 대기</button>
      <button class="filter-btn" onclick="setStatusFilter('approved', this)">✅ 승인</button>
      <button class="filter-btn" onclick="setStatusFilter('rejected', this)">❌ 거절</button>
    </div>

    <div id="pool-list"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const ADMIN_PW    = '0000';
const SESSION_KEY = 'hawujae_admin_ok';

const ROLE_LABELS = {
  seller:'매도자', buyer:'매수자', landlord:'임대인', tenant:'신규임차인',
  outgoing:'기존임차인 (자리 물려주기)', interior:'인테리어 업체', reno:'리모델링 업체'
};
const ROLE_ICONS = {
  seller:'🏠', buyer:'🔍', landlord:'🔑', tenant:'📋',
  outgoing:'🚪', interior:'🎨', reno:'🔨'
};

let allItems   = [];
let roleFilter   = null;
let statusFilter = null;

function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (pw === ADMIN_PW) {
    sessionStorage.setItem(SESSION_KEY, '1');
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('admin-screen').classList.remove('hidden');
    initAdmin();
  } else {
    document.getElementById('login-err').textContent = '비밀번호가 틀렸습니다.';
    document.getElementById('pw-input').value = '';
  }
}

function doLogout() {
  sessionStorage.removeItem(SESSION_KEY);
  location.reload();
}

window.onload = function() {
  if (sessionStorage.getItem(SESSION_KEY)) {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('admin-screen').classList.remove('hidden');
    initAdmin();
  }
};

async function initAdmin() {
  try {
    const ok = await DB.init();
    document.getElementById('db-status').className = 'db-status ' + (ok ? 'firestore' : 'local');
    document.getElementById('db-status').textContent = ok ? '☁️ Firestore' : '💾 로컬';
  } catch(e) {
    document.getElementById('db-status').className = 'db-status local';
    document.getElementById('db-status').textContent = '💾 로컬';
  }
  await loadPool();
}

async function loadPool() {
  try {
    allItems = await DB.getRegisterPool() || [];
  } catch(e) { allItems = []; }
  renderStats();
  renderList();
}

function renderStats() {
  const total    = allItems.length;
  const pending  = allItems.filter(i => i.status === 'pending').length;
  const approved = allItems.filter(i => i.status === 'approved').length;
  const rejected = allItems.filter(i => i.status === 'rejected').length;
  document.getElementById('stats-area').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">전체</div></div>
    <div class="stat-card" style="border-left:3px solid #BF6000">
      <div class="stat-num" style="color:#BF6000">${pending}</div><div class="stat-label">대기</div></div>
    <div class="stat-card" style="border-left:3px solid var(--success)">
      <div class="stat-num" style="color:var(--success)">${approved}</div><div class="stat-label">승인</div></div>
    <div class="stat-card" style="border-left:3px solid var(--error)">
      <div class="stat-num" style="color:var(--error)">${rejected}</div><div class="stat-label">거절</div></div>`;
}

function renderList() {
  let items = [...allItems];
  if (roleFilter)   items = items.filter(i => i.role   === roleFilter);
  if (statusFilter) items = items.filter(i => i.status === statusFilter);

  const listEl = document.getElementById('pool-list');
  if (!items.length) {
    listEl.innerHTML = '<div class="empty">조건에 맞는 등록 신청이 없습니다.</div>';
    return;
  }
  listEl.innerHTML = items.map(renderCard).join('');
}

function renderCard(item) {
  const roleLabel  = ROLE_LABELS[item.role] || item.role;
  const roleIcon   = ROLE_ICONS[item.role]  || '👤';
  const statusBadge = item.status === 'approved'
    ? '<span class="badge badge-approved">✅ 승인됨</span>'
    : item.status === 'rejected'
    ? '<span class="badge badge-rejected">❌ 거절됨</span>'
    : '<span class="badge badge-pending">⏳ 검토 대기</span>';
  const dateStr = item.createdAt
    ? new Date(item.createdAt).toLocaleDateString('ko-KR', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})
    : '';
  const isPending = !item.status || item.status === 'pending';
  const id = item.id || item.localId || '';

  return `
  <div class="pool-card" id="card-${id}">
    <div class="pool-card-header">
      <div>
        <div class="pool-name">${roleIcon} ${item.name || '(이름 없음)'}</div>
        <div class="pool-phone">📞 ${item.phone || '-'}</div>
      </div>
      <div class="pool-badges">
        <span class="badge badge-role">${roleLabel}</span>
        ${statusBadge}
      </div>
    </div>
    ${item.spec ? `<div class="pool-spec">🔧 전문분야: ${item.spec}</div>` : ''}
    ${item.desc ? `<div class="pool-desc">${item.desc}</div>` : ''}
    <div class="pool-footer">
      <div class="pool-date">${dateStr}</div>
      <div class="action-btns">
        <button class="btn-approve" ${!isPending?'disabled':''} onclick="approve('${id}', true)">✅ 승인</button>
        <button class="btn-reject"  ${!isPending?'disabled':''} onclick="approve('${id}', false)">❌ 거절</button>
      </div>
    </div>
  </div>`;
}

async function approve(id, isApproved) {
  const ok = await DB.approveRegister(id, isApproved);
  if (ok) {
    toast(isApproved ? '✅ 승인되었습니다.' : '❌ 거절되었습니다.');
    await loadPool();
  } else {
    toast('⚠️ 처리 중 오류가 발생했습니다.');
  }
}

function setRoleFilter(val, btn) {
  roleFilter = val;
  document.querySelectorAll('.filter-bar:first-of-type .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function setStatusFilter(val, btn) {
  statusFilter = val;
  document.querySelectorAll('.filter-bar:last-of-type .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
</body>
</html>
